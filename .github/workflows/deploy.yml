name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 72.60.56.80 >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          ssh deploy@72.60.56.80 bash -l << 'EOF'
            set -e
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            cd /var/www/simplificar
            git fetch origin main
            git reset --hard origin/main

            # Backend
            cd backend
            npm install
            npm run build

            # Frontend
            cd ../frontend
            npm install
            npm run build

            # Restart (env vars live in backend/.env, untracked — preserved by reset)
            pm2 reload simplificar-api --update-env || \
              pm2 start /var/www/simplificar/backend/ecosystem.config.js
            pm2 save

            echo "Deployed!"
          EOF
