name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 72.60.56.80 >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          ssh deploy@72.60.56.80 bash -l << 'EOF'
            set -e
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            cd /var/www/simplificar
            git fetch origin main
            git reset --hard origin/main

            # Backend
            cd backend
            npm install
            npm run build

            # Frontend
            cd ../frontend
            npm install
            npm run build

            # Banco: aplica patches idempotentes de produção (não destrutivo; nunca apaga dados).
            # O deploy não semeia o banco, então garantimos aqui os dados de demo que faltam.
            cd /var/www/simplificar
            if [ -f db/seed/prod_ensure.sql ]; then
              DATABASE_URL=$(grep -E '^DATABASE_URL=' backend/.env | head -1 | cut -d= -f2- | sed 's/^"//;s/"$//')
              psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f db/seed/prod_ensure.sql \
                || echo "WARN: prod_ensure.sql falhou — deploy segue"
            fi

            # Restart (env vars live in backend/.env, untracked — preserved by reset)
            pm2 reload simplificar-api --update-env || \
              pm2 start /var/www/simplificar/backend/ecosystem.config.js
            pm2 save

            echo "Deployed!"
          EOF
